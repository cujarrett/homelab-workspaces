apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-cosmic-rocket
spec:
  parameters:
    namespace: guest-cosmic-rocket
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo1-api.mattjarrett.dev
    tlsIssuer: letsencrypt-prod
    sqlRef:
      name: xsql-cosmic-rocket
    nosqlRef:
      name: xnosql-cosmic-rocket
    objectStorageRef:
      name: xobjectstorage-cosmic-rocket
    cache:
      enabled: true
    readinessCheckPath: /readyz
