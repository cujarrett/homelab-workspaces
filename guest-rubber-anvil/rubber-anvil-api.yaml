apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: rubber-anvil-api
spec:
  parameters:
    namespace: guest-rubber-anvil
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo1-api.mattjarrett.dev
    tlsSecret: demo1-api-tls
    sqlRef:
      name: rubber-anvil-sql
      backend: private-cloud
    nosqlRef:
      name: rubber-anvil-nosql
    objectStorageRefs:
      - name: rubber-anvil-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
