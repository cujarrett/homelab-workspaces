apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: turbo-penguin-api
spec:
  parameters:
    namespace: guest-turbo-penguin
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo5-api.mattjarrett.dev
    tlsSecret: demo5-api-tls
    sqlRef:
      name: turbo-penguin-sql
      backend: private-cloud
    nosqlRef:
      name: turbo-penguin-nosql
    objectStorageRefs:
      - name: turbo-penguin-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
