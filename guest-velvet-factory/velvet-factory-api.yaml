apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: velvet-factory-api
spec:
  parameters:
    namespace: guest-velvet-factory
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo2-api.mattjarrett.dev
    tlsSecret: demo2-api-tls
    sqlRef:
      name: velvet-factory-sql
      backend: private-cloud
    nosqlRef:
      name: velvet-factory-nosql
    objectStorageRefs:
      - name: velvet-factory-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
