apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-velvet-anvil
spec:
  parameters:
    namespace: guest-velvet-anvil
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo5-api.mattjarrett.dev
    tlsSecret: demo5-api-tls
    sqlRef:
      name: xsql-velvet-anvil
      backend: private-cloud
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
