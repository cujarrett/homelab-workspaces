apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-phantom-cactus
spec:
  parameters:
    namespace: guest-phantom-cactus
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo3-api.mattjarrett.dev
    tlsSecret: demo3-api-tls
    sqlRef:
      name: xsql-phantom-cactus
      backend: private-cloud
    nosqlRef:
      name: xnosql-phantom-cactus
    objectStorageRefs:
      - name: xobjectstorage-phantom-cactus
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
