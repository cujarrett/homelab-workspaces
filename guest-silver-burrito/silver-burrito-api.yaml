apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: silver-burrito-api
spec:
  parameters:
    namespace: guest-silver-burrito
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo5-api.mattjarrett.dev
    tlsSecret: demo5-api-tls
    sqlRef:
      name: silver-burrito-sql
      backend: private-cloud
    nosqlRef:
      name: silver-burrito-nosql
    objectStorageRefs:
      - name: silver-burrito-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
