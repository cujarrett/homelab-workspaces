apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: cosmic-tornado-api
spec:
  parameters:
    namespace: guest-cosmic-tornado
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo1-api.mattjarrett.dev
    tlsSecret: demo1-api-tls
    sqlRef:
      name: cosmic-tornado-sql
      backend: private-cloud
    nosqlRef:
      name: cosmic-tornado-nosql
    objectStorageRefs:
      - name: cosmic-tornado-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
