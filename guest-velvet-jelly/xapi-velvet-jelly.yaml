apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-velvet-jelly
spec:
  parameters:
    namespace: guest-velvet-jelly
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo4-api.mattjarrett.dev
    tlsSecret: demo4-api-tls
    sqlRef:
      name: xsql-velvet-jelly
      backend: private-cloud
    nosqlRef:
      name: xnosql-velvet-jelly
    objectStorageRefs:
      - name: xobjectstorage-velvet-jelly
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
