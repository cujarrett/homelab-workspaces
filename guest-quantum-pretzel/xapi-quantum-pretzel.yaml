apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-quantum-pretzel
spec:
  parameters:
    namespace: guest-quantum-pretzel
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo1-api.mattjarrett.dev
    tlsSecret: demo1-api-tls
    sqlRef:
      name: xsql-quantum-pretzel
      backend: private-cloud
    nosqlRef:
      name: xnosql-quantum-pretzel
    objectStorageRefs:
      - name: xobjectstorage-quantum-pretzel
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
