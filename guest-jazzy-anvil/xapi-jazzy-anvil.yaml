apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-jazzy-anvil
spec:
  parameters:
    namespace: guest-jazzy-anvil
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo2-api.mattjarrett.dev
    tlsSecret: demo2-api-tls
    sqlRef:
      name: xsql-jazzy-anvil
      backend: private-cloud
    nosqlRef:
      name: xnosql-jazzy-anvil
    objectStorageRefs:
      - name: xobjectstorage-jazzy-anvil
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
