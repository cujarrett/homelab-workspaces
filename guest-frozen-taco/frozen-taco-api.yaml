apiVersion: platform.local.lab/v1alpha1
kind: Api
metadata:
  name: frozen-taco-api
spec:
  parameters:
    namespace: guest-frozen-taco
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo4-api.mattjarrett.dev
    tlsSecret: demo4-api-tls
    sqlRef:
      name: frozen-taco-sql
      backend: private-cloud
    nosqlRef:
      name: frozen-taco-nosql
    objectStorageRefs:
      - name: frozen-taco-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
