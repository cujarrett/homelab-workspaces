apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: frozen-taco-api
spec:
  parameters:
    namespace: guest-frozen-taco
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo1-api.mattjarrett.dev
    tlsSecret: demo1-api-tls
    nosqlRef:
      name: frozen-taco-nosql
    objectStorageRefs:
      - name: frozen-taco-store
    readinessCheckPath: /readyz
