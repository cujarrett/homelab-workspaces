apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: atomic-factory-api
spec:
  parameters:
    namespace: guest-atomic-factory
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo4-api.mattjarrett.dev
    tlsSecret: demo4-api-tls
    sqlRef:
      name: atomic-factory-sql
      backend: private-cloud
    nosqlRef:
      name: atomic-factory-nosql
    objectStorageRefs:
      - name: atomic-factory-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
