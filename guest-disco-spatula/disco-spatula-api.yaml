apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: disco-spatula-api
spec:
  parameters:
    namespace: guest-disco-spatula
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo5-api.mattjarrett.dev
    tlsSecret: demo5-api-tls
    sqlRef:
      name: disco-spatula-sql
      backend: private-cloud
    nosqlRef:
      name: disco-spatula-nosql
    objectStorageRefs:
      - name: disco-spatula-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
