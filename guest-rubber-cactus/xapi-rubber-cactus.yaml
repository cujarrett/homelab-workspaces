apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-rubber-cactus
spec:
  parameters:
    namespace: guest-rubber-cactus
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo1-api.mattjarrett.dev
    tlsIssuer: letsencrypt-prod
    sqlRef:
      name: xsql-rubber-cactus
      backend: private-cloud
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
