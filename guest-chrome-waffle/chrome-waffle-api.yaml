apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: chrome-waffle-api
spec:
  parameters:
    namespace: guest-chrome-waffle
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo2-api.mattjarrett.dev
    tlsSecret: demo2-api-tls
    sqlRef:
      name: chrome-waffle-sql
      backend: private-cloud
    nosqlRef:
      name: chrome-waffle-nosql
    objectStorageRefs:
      - name: chrome-waffle-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
