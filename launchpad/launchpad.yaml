# nginx proxies /api/ → launchpad-api in-cluster; API never gets a public hostname.
# CSP extended to allow MSAL token requests to login.microsoftonline.com.
apiVersion: platform.local.lab/v1alpha1
kind: XSpa
metadata:
  name: launchpad
spec:
  parameters:
    image: ghcr.io/cujarrett/launchpad:sha-17735f0898c35ad14fb591d42c18a58be12ba3ad
    repo: https://github.com/cujarrett/launchpad
    namespace: launchpad
    host: launchpad.mattjarrett.dev
    tlsIssuer: letsencrypt-prod
    size: sm
    contentSecurityPolicy: >-
      default-src 'self';
      style-src 'self' 'unsafe-inline';
      connect-src 'self' https://mattjarrett.dev https://*.mattjarrett.dev https://login.microsoftonline.com https://*.microsoftonline.com;
      frame-ancestors 'none';
      base-uri 'self';
    apiProxy:
      enabled: true
      # /api/ is stripped by nginx before forwarding, so append /api here to
      # preserve the path prefix the Go API expects on its registered routes.
      upstream: launchpad-api.launchpad.svc.cluster.local/api
