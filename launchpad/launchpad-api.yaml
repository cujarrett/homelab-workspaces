    image: ghcr.io/cujarrett/launchpad-api:sha-c68622a2f732373ce970ef913d279c8ee41da6e4
    repo: https://github.com/cujarrett/launchpad-api
    namespace: launchpad
    port: 8080
    size: sm
    secretRef:
      name: launchpad-secrets
