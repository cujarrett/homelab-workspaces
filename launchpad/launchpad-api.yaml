    image: ghcr.io/cujarrett/launchpad-api:sha-dac88c56011a93d23ff5edd927645f93ec861f50
    repo: https://github.com/cujarrett/launchpad-api
    namespace: launchpad
    port: 8080
    size: sm
    secretRef:
      name: launchpad-secrets
