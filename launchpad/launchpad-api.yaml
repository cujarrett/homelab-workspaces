    image: ghcr.io/cujarrett/launchpad-api:sha-95d2d6b98c787c4c188d82285f986c652e9038b6
    repo: https://github.com/cujarrett/launchpad-api
    namespace: launchpad
    port: 8080
    size: sm
    secretRef:
      name: launchpad-secrets
