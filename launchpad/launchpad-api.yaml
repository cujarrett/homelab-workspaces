apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: launchpad-api
spec:
  parameters:
    image: ghcr.io/cujarrett/launchpad-api:sha-543e4f518b5615adb5584202c4e7f9ece41c2ed0
    repo: https://github.com/cujarrett/launchpad-api
    namespace: launchpad
    port: 8080
    size: sm
    secretRef:
      name: launchpad-secrets
