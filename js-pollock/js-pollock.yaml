apiVersion: platform.local.lab/v1alpha1
kind: XSpa
metadata:
  name: js-pollock
spec:
  parameters:
    namespace: js-pollock
    image: ghcr.io/cujarrett/js-pollock:sha-601c472e8b4aa7826745ce977440e4322e5d5f28
    host: jspollock.mattjarrett.dev
    tlsIssuer: letsencrypt-prod
    contentSecurityPolicy: "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; script-src 'self'; connect-src 'self'; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'none'; base-uri 'self';"
    healthCheckPath: /healthz
    replicas: 1
    cpuRequest: "50m"
    cpuLimit: "200m"
    memoryRequest: "64Mi"
    memoryLimit: "128Mi"
