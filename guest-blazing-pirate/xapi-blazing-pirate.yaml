apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-blazing-pirate
spec:
  parameters:
    namespace: guest-blazing-pirate
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo1-api.mattjarrett.dev
    tlsIssuer: letsencrypt-prod
    nosqlRef:
      name: xnosql-blazing-pirate
    objectStorageRefs:
      - name: xobjectstorage-blazing-pirate
    readinessCheckPath: /readyz
