apiVersion: platform.local.lab/v1alpha1
kind: Api
metadata:
  name: atomic-rocket-api
spec:
  parameters:
    namespace: guest-atomic-rocket
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo1-api.mattjarrett.dev
    tlsSecret: demo1-api-tls
    sqlRef:
      name: atomic-rocket-sql
      backend: private-cloud
    nosqlRef:
      name: atomic-rocket-nosql
    objectStorageRefs:
      - name: atomic-rocket-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
