apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: frozen-pretzel-api
spec:
  parameters:
    namespace: guest-frozen-pretzel
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo2-api.mattjarrett.dev
    tlsSecret: demo2-api-tls
    sqlRef:
      name: frozen-pretzel-sql
      backend: private-cloud
    nosqlRef:
      name: frozen-pretzel-nosql
    objectStorageRefs:
      - name: frozen-pretzel-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
