apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-midnight-tornado
spec:
  parameters:
    namespace: guest-midnight-tornado
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo2-api.mattjarrett.dev
    tlsSecret: demo2-api-tls
    nosqlRef:
      name: xnosql-midnight-tornado
    objectStorageRefs:
      - name: xobjectstorage-midnight-tornado
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
