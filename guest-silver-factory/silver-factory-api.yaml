apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: silver-factory-api
spec:
  parameters:
    namespace: guest-silver-factory
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo1-api.mattjarrett.dev
    tlsSecret: demo1-api-tls
    sqlRef:
      name: silver-factory-sql
      backend: private-cloud
    nosqlRef:
      name: silver-factory-nosql
    objectStorageRefs:
      - name: silver-factory-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
