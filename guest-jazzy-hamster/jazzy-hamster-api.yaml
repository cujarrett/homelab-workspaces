apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: jazzy-hamster-api
spec:
  parameters:
    namespace: guest-jazzy-hamster
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo3-api.mattjarrett.dev
    tlsSecret: demo3-api-tls
    sqlRef:
      name: jazzy-hamster-sql
      backend: private-cloud
    nosqlRef:
      name: jazzy-hamster-nosql
    objectStorageRefs:
      - name: jazzy-hamster-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
