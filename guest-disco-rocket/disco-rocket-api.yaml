apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: disco-rocket-api
spec:
  parameters:
    namespace: guest-disco-rocket
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo3-api.mattjarrett.dev
    tlsSecret: demo3-api-tls
    sqlRef:
      name: disco-rocket-sql
      backend: private-cloud
    nosqlRef:
      name: disco-rocket-nosql
    objectStorageRefs:
      - name: disco-rocket-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
