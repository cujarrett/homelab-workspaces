apiVersion: platform.local.lab/v1alpha1
kind: Api
metadata:
  name: upstream-api
spec:
  parameters:
    namespace: poc-api
    image: ghcr.io/cujarrett/platform-connections-demo-upstream-api:latest
    repo: https://github.com/cujarrett/platform-connections-demo
    port: 8080
    metricsPort: 8080
    size: xs
    # Locked down: only connections declared via Connection reach this service.
    enforce: true
