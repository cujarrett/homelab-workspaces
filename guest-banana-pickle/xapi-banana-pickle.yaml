apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-banana-pickle
spec:
  parameters:
    namespace: guest-banana-pickle
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo4-api.mattjarrett.dev
    tlsIssuer: letsencrypt-prod
    sqlRef:
      name: xsql-banana-pickle
    nosqlRef:
      name: xnosql-banana-pickle
    objectStorageRef:
      name: xobjectstorage-banana-pickle
    cache:
      enabled: true
    readinessCheckPath: /readyz
