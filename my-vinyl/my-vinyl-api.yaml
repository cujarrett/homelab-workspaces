apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: my-vinyl-api
spec:
  parameters:
    namespace: my-vinyl
    image: ghcr.io/cujarrett/my-vinyl-api:sha-5ced2fef649117471aaffa7db516d38e4d5e49e3
    repo: https://github.com/cujarrett/my-vinyl-api
    port: 8080
    replicas: 1
