apiVersion: platform.local.lab/v1alpha1
kind: Api
metadata:
  name: my-vinyl-api
spec:
  parameters:
    namespace: my-vinyl
    image: ghcr.io/cujarrett/my-vinyl-api:sha-3668e10e0f7ab4cf2d197ca1b564cd1c1d8a8d10
    repo: https://github.com/cujarrett/my-vinyl-api
    port: 8080
    replicas: 1
    host: my-vinyl-api.local.lab
    tlsIssuer: local-lab-ca-issuer
    secretRef:
      name: discogs-credentials
    cache:
      enabled: true
      backend: private-cloud
