# Staged ahead of enforce: true on my-vinyl-api — blocked until Traefik itself is meshed.
apiVersion: platform.local.lab/v1alpha1
kind: Connection
metadata:
  name: my-vinyl-spa-conns
spec:
  parameters:
    from:
      namespace: my-vinyl
      serviceAccount: my-vinyl # Spa's own dedicated SA, matching its XR name
    toServices:
      - namespace: my-vinyl
        appLabel: my-vinyl-api
        port: 8080
---
apiVersion: platform.local.lab/v1alpha1
kind: Connection
metadata:
  name: my-vinyl-api-conns
spec:
  parameters:
    from:
      namespace: my-vinyl
      serviceAccount: my-vinyl-api
    toExternals:
      - fqdn: api.discogs.com
        port: 443
