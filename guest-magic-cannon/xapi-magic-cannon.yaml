apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-magic-cannon
spec:
  parameters:
    namespace: guest-magic-cannon
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo5-api.mattjarrett.dev
    tlsIssuer: letsencrypt-prod
    sqlRef:
      name: xsql-magic-cannon
    nosqlRef:
      name: xnosql-magic-cannon
    objectStorageRef:
      name: xobjectstorage-magic-cannon
    cache:
      enabled: true
    readinessCheckPath: /readyz
