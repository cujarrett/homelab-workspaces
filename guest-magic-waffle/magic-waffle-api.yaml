apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: magic-waffle-api
spec:
  parameters:
    namespace: guest-magic-waffle
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo4-api.mattjarrett.dev
    tlsSecret: demo4-api-tls
    sqlRef:
      name: magic-waffle-sql
      backend: private-cloud
    nosqlRef:
      name: magic-waffle-nosql
    objectStorageRefs:
      - name: magic-waffle-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
