apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-rubber-pretzel
spec:
  parameters:
    namespace: guest-rubber-pretzel
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo2-api.mattjarrett.dev
    tlsIssuer: letsencrypt-prod
    nosqlRef:
      name: xnosql-rubber-pretzel
    objectStorageRefs:
      - name: xobjectstorage-rubber-pretzel
    readinessCheckPath: /readyz
