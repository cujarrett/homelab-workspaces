apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-haunted-cactus
spec:
  parameters:
    namespace: guest-haunted-cactus
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo3-api.mattjarrett.dev
    tlsIssuer: letsencrypt-prod
    sqlRef:
      name: xsql-haunted-cactus
    nosqlRef:
      name: xnosql-haunted-cactus
    objectStorageRef:
      name: xobjectstorage-haunted-cactus
    cache:
      enabled: true
    readinessCheckPath: /readyz
