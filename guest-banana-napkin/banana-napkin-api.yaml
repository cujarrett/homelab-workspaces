apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: banana-napkin-api
spec:
  parameters:
    namespace: guest-banana-napkin
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo3-api.mattjarrett.dev
    tlsSecret: demo3-api-tls
    nosqlRef:
      name: banana-napkin-nosql
    objectStorageRefs:
      - name: banana-napkin-store
    readinessCheckPath: /readyz
