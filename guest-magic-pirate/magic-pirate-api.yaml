apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: magic-pirate-api
spec:
  parameters:
    namespace: guest-magic-pirate
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo5-api.mattjarrett.dev
    tlsSecret: demo5-api-tls
    sqlRef:
      name: magic-pirate-sql
      backend: private-cloud
    nosqlRef:
      name: magic-pirate-nosql
    objectStorageRefs:
      - name: magic-pirate-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
