apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: electric-cactus-api
spec:
  parameters:
    namespace: guest-electric-cactus
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo3-api.mattjarrett.dev
    tlsSecret: demo3-api-tls
    sqlRef:
      name: electric-cactus-sql
      backend: private-cloud
    nosqlRef:
      name: electric-cactus-nosql
    objectStorageRefs:
      - name: electric-cactus-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
