apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-shadow-cannon
spec:
  parameters:
    namespace: guest-shadow-cannon
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo2-api.mattjarrett.dev
    tlsSecret: demo2-api-tls
    sqlRef:
      name: xsql-shadow-cannon
      backend: private-cloud
    nosqlRef:
      name: xnosql-shadow-cannon
    objectStorageRefs:
      - name: xobjectstorage-shadow-cannon
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
