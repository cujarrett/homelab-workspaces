apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: silver-napkin-api
spec:
  parameters:
    namespace: guest-silver-napkin
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo4-api.mattjarrett.dev
    tlsSecret: demo4-api-tls
    sqlRef:
      name: silver-napkin-sql
      backend: private-cloud
    nosqlRef:
      name: silver-napkin-nosql
    objectStorageRefs:
      - name: silver-napkin-store
    readinessCheckPath: /readyz
