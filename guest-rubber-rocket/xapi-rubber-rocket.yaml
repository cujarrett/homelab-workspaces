apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-rubber-rocket
spec:
  parameters:
    namespace: guest-rubber-rocket
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo5-api.mattjarrett.dev
    tlsSecret: demo5-api-tls
    nosqlRef:
      name: xnosql-rubber-rocket
    objectStorageRefs:
      - name: xobjectstorage-rubber-rocket
    readinessCheckPath: /readyz
