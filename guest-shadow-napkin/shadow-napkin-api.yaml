apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: shadow-napkin-api
spec:
  parameters:
    namespace: guest-shadow-napkin
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo2-api.mattjarrett.dev
    tlsSecret: demo2-api-tls
    sqlRef:
      name: shadow-napkin-sql
      backend: private-cloud
    nosqlRef:
      name: shadow-napkin-nosql
    objectStorageRefs:
      - name: shadow-napkin-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
