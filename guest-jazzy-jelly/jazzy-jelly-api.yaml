apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: jazzy-jelly-api
spec:
  parameters:
    namespace: guest-jazzy-jelly
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo3-api.mattjarrett.dev
    tlsSecret: demo3-api-tls
    sqlRef:
      name: jazzy-jelly-sql
      backend: private-cloud
    nosqlRef:
      name: jazzy-jelly-nosql
    objectStorageRefs:
      - name: jazzy-jelly-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
