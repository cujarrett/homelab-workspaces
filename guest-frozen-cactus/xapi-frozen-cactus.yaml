apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-frozen-cactus
spec:
  parameters:
    namespace: guest-frozen-cactus
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo5-api.mattjarrett.dev
    tlsSecret: demo5-api-tls
    nosqlRef:
      name: xnosql-frozen-cactus
    objectStorageRefs:
      - name: xobjectstorage-frozen-cactus
    readinessCheckPath: /readyz
