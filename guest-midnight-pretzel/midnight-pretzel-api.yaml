apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: midnight-pretzel-api
spec:
  parameters:
    namespace: guest-midnight-pretzel
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo4-api.mattjarrett.dev
    tlsSecret: demo4-api-tls
    sqlRef:
      name: midnight-pretzel-sql
      backend: private-cloud
    nosqlRef:
      name: midnight-pretzel-nosql
    objectStorageRefs:
      - name: midnight-pretzel-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
