apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: neon-anvil-api
spec:
  parameters:
    namespace: guest-neon-anvil
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo5-api.mattjarrett.dev
    tlsSecret: demo5-api-tls
    sqlRef:
      name: neon-anvil-sql
      backend: private-cloud
    nosqlRef:
      name: neon-anvil-nosql
    objectStorageRefs:
      - name: neon-anvil-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
