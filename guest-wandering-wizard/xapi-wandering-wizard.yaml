apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-wandering-wizard
spec:
  parameters:
    namespace: guest-wandering-wizard
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo1-api.mattjarrett.dev
    tlsIssuer: letsencrypt-prod
    objectStorageRef:
      name: xobjectstorage-wandering-wizard
    cache:
      enabled: true
    readinessCheckPath: /readyz
