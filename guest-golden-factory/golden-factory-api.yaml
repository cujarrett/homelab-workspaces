apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: golden-factory-api
spec:
  parameters:
    namespace: guest-golden-factory
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo5-api.mattjarrett.dev
    tlsSecret: demo5-api-tls
    sqlRef:
      name: golden-factory-sql
      backend: private-cloud
    nosqlRef:
      name: golden-factory-nosql
    objectStorageRefs:
      - name: golden-factory-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
