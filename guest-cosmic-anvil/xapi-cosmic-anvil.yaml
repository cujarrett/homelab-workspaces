apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-cosmic-anvil
spec:
  parameters:
    namespace: guest-cosmic-anvil
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo3-api.mattjarrett.dev
    tlsIssuer: letsencrypt-prod
    sqlRef:
      name: xsql-cosmic-anvil
      backend: private-cloud
    nosqlRef:
      name: xnosql-cosmic-anvil
    objectStorageRefs:
      - name: xobjectstorage-cosmic-anvil
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
