apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: magic-penguin-api
spec:
  parameters:
    namespace: guest-magic-penguin
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo1-api.mattjarrett.dev
    tlsSecret: demo1-api-tls
    sqlRef:
      name: magic-penguin-sql
      backend: private-cloud
    nosqlRef:
      name: magic-penguin-nosql
    objectStorageRefs:
      - name: magic-penguin-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
