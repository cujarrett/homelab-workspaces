apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-magic-penguin
spec:
  parameters:
    namespace: guest-magic-penguin
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo5-api.mattjarrett.dev
    tlsIssuer: letsencrypt-prod
    sqlRef:
      name: xsql-magic-penguin
      backend: private-cloud
    nosqlRef:
      name: xnosql-magic-penguin
    objectStorageRefs:
      - name: xobjectstorage-magic-penguin
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
