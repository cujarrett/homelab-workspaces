apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: frozen-volcano-api
spec:
  parameters:
    namespace: guest-frozen-volcano
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo5-api.mattjarrett.dev
    tlsSecret: demo5-api-tls
    sqlRef:
      name: frozen-volcano-sql
      backend: private-cloud
    objectStorageRefs:
      - name: frozen-volcano-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
