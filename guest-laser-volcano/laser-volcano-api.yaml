apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: laser-volcano-api
spec:
  parameters:
    namespace: guest-laser-volcano
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo5-api.mattjarrett.dev
    tlsSecret: demo5-api-tls
    sqlRef:
      name: laser-volcano-sql
      backend: private-cloud
    nosqlRef:
      name: laser-volcano-nosql
    objectStorageRefs:
      - name: laser-volcano-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
