apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: atomic-cannon-api
spec:
  parameters:
    namespace: guest-atomic-cannon
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo4-api.mattjarrett.dev
    tlsSecret: demo4-api-tls
    sqlRef:
      name: atomic-cannon-sql
      backend: private-cloud
    nosqlRef:
      name: atomic-cannon-nosql
    objectStorageRefs:
      - name: atomic-cannon-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
