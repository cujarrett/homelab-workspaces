apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: quantum-llama-api
spec:
  parameters:
    namespace: guest-quantum-llama
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo3-api.mattjarrett.dev
    tlsSecret: demo3-api-tls
    sqlRef:
      name: quantum-llama-sql
      backend: private-cloud
    nosqlRef:
      name: quantum-llama-nosql
    objectStorageRefs:
      - name: quantum-llama-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
