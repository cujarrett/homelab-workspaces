apiVersion: platform.local.lab/v1alpha1
kind: Api
metadata:
  name: blazing-jelly-api
spec:
  parameters:
    namespace: guest-blazing-jelly
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo2-api.mattjarrett.dev
    tlsSecret: demo2-api-tls
    sqlRef:
      name: blazing-jelly-sql
      backend: private-cloud
    nosqlRef:
      name: blazing-jelly-nosql
    objectStorageRefs:
      - name: blazing-jelly-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
