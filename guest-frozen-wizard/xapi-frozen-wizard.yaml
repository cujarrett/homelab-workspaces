apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-frozen-wizard
spec:
  parameters:
    namespace: guest-frozen-wizard
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo4-api.mattjarrett.dev
    tlsIssuer: letsencrypt-prod
    sqlRef:
      name: xsql-frozen-wizard
      backend: private-cloud
    objectStorageRefs:
      - name: xobjectstorage-frozen-wizard
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
