apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: velvet-rocket-api
spec:
  parameters:
    namespace: guest-velvet-rocket
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo5-api.mattjarrett.dev
    tlsSecret: demo5-api-tls
    sqlRef:
      name: velvet-rocket-sql
      backend: private-cloud
    nosqlRef:
      name: velvet-rocket-nosql
    objectStorageRefs:
      - name: velvet-rocket-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
