apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: haunted-llama-api
spec:
  parameters:
    namespace: guest-haunted-llama
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo3-api.mattjarrett.dev
    tlsSecret: demo3-api-tls
    nosqlRef:
      name: haunted-llama-nosql
    objectStorageRefs:
      - name: haunted-llama-store
    readinessCheckPath: /readyz
