apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: neon-spatula-api
spec:
  parameters:
    namespace: guest-neon-spatula
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo2-api.mattjarrett.dev
    tlsSecret: demo2-api-tls
    nosqlRef:
      name: neon-spatula-nosql
    objectStorageRefs:
      - name: neon-spatula-store
    readinessCheckPath: /readyz
