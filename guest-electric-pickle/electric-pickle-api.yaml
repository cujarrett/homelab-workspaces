apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: electric-pickle-api
spec:
  parameters:
    namespace: guest-electric-pickle
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo1-api.mattjarrett.dev
    tlsSecret: demo1-api-tls
    sqlRef:
      name: electric-pickle-sql
      backend: private-cloud
    nosqlRef:
      name: electric-pickle-nosql
    objectStorageRefs:
      - name: electric-pickle-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
