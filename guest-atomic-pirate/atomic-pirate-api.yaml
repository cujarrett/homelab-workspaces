apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: atomic-pirate-api
spec:
  parameters:
    namespace: guest-atomic-pirate
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo4-api.mattjarrett.dev
    tlsSecret: demo4-api-tls
    sqlRef:
      name: atomic-pirate-sql
      backend: private-cloud
    nosqlRef:
      name: atomic-pirate-nosql
    objectStorageRefs:
      - name: atomic-pirate-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
