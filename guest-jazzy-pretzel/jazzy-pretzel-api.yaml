apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: jazzy-pretzel-api
spec:
  parameters:
    namespace: guest-jazzy-pretzel
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo4-api.mattjarrett.dev
    tlsSecret: demo4-api-tls
    sqlRef:
      name: jazzy-pretzel-sql
      backend: private-cloud
    nosqlRef:
      name: jazzy-pretzel-nosql
    objectStorageRefs:
      - name: jazzy-pretzel-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
