apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: electric-waffle-api
spec:
  parameters:
    namespace: guest-electric-waffle
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo1-api.mattjarrett.dev
    tlsSecret: demo1-api-tls
    sqlRef:
      name: electric-waffle-sql
      backend: private-cloud
    nosqlRef:
      name: electric-waffle-nosql
    objectStorageRefs:
      - name: electric-waffle-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
