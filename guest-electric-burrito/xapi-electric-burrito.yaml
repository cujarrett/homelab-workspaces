apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-electric-burrito
spec:
  parameters:
    namespace: guest-electric-burrito
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo5-api.mattjarrett.dev
    tlsIssuer: letsencrypt-prod
    sqlRef:
      name: xsql-electric-burrito
      backend: private-cloud
    nosqlRef:
      name: xnosql-electric-burrito
    objectStorageRefs:
      - name: xobjectstorage-electric-burrito
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
