apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-neon-tornado
spec:
  parameters:
    namespace: guest-neon-tornado
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo2-api.mattjarrett.dev
    tlsSecret: demo2-api-tls
    sqlRef:
      name: xsql-neon-tornado
      backend: private-cloud
    objectStorageRefs:
      - name: xobjectstorage-neon-tornado
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
