apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-magic-catapult
spec:
  parameters:
    namespace: guest-magic-catapult
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo1-api.mattjarrett.dev
    tlsIssuer: letsencrypt-prod
    sqlRef:
      name: xsql-magic-catapult
    cache:
      enabled: true
    readinessCheckPath: /readyz
