apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: fuzzy-pirate-api
spec:
  parameters:
    namespace: guest-fuzzy-pirate
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo1-api.mattjarrett.dev
    tlsSecret: demo1-api-tls
    sqlRef:
      name: fuzzy-pirate-sql
      backend: private-cloud
    nosqlRef:
      name: fuzzy-pirate-nosql
    objectStorageRefs:
      - name: fuzzy-pirate-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
