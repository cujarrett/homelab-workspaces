apiVersion: platform.local.lab/v1alpha1
kind: Api
metadata:
  name: cosmic-cannon-api
spec:
  parameters:
    namespace: guest-cosmic-cannon
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo2-api.mattjarrett.dev
    tlsSecret: demo2-api-tls
    sqlRef:
      name: cosmic-cannon-sql
      backend: private-cloud
    nosqlRef:
      name: cosmic-cannon-nosql
    objectStorageRefs:
      - name: cosmic-cannon-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
