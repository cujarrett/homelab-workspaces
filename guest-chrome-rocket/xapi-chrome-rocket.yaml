apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-chrome-rocket
spec:
  parameters:
    namespace: guest-chrome-rocket
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo5-api.mattjarrett.dev
    tlsIssuer: letsencrypt-prod
    sqlRef:
      name: xsql-chrome-rocket
      backend: private-cloud
    nosqlRef:
      name: xnosql-chrome-rocket
    objectStorageRefs:
      - name: xobjectstorage-chrome-rocket
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
