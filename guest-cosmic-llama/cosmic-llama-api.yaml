apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: cosmic-llama-api
spec:
  parameters:
    namespace: guest-cosmic-llama
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo4-api.mattjarrett.dev
    tlsSecret: demo4-api-tls
    sqlRef:
      name: cosmic-llama-sql
      backend: private-cloud
    nosqlRef:
      name: cosmic-llama-nosql
    objectStorageRefs:
      - name: cosmic-llama-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
