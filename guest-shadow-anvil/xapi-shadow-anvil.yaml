apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-shadow-anvil
spec:
  parameters:
    namespace: guest-shadow-anvil
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo1-api.mattjarrett.dev
    tlsSecret: demo1-api-tls
    sqlRef:
      name: xsql-shadow-anvil
      backend: private-cloud
    nosqlRef:
      name: xnosql-shadow-anvil
    objectStorageRefs:
      - name: xobjectstorage-shadow-anvil
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
