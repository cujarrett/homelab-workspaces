apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-neon-cannon
spec:
  parameters:
    namespace: guest-neon-cannon
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo2-api.mattjarrett.dev
    tlsSecret: demo2-api-tls
    sqlRef:
      name: xsql-neon-cannon
      backend: private-cloud
    nosqlRef:
      name: xnosql-neon-cannon
    objectStorageRefs:
      - name: xobjectstorage-neon-cannon
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
