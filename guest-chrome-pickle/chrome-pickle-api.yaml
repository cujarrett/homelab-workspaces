apiVersion: platform.local.lab/v1alpha1
kind: Api
metadata:
  name: chrome-pickle-api
spec:
  parameters:
    namespace: guest-chrome-pickle
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo1-api.mattjarrett.dev
    tlsSecret: demo1-api-tls
    sqlRef:
      name: chrome-pickle-sql
      backend: private-cloud
    nosqlRef:
      name: chrome-pickle-nosql
    objectStorageRefs:
      - name: chrome-pickle-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
