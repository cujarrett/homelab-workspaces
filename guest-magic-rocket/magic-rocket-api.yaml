apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: magic-rocket-api
spec:
  parameters:
    namespace: guest-magic-rocket
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo2-api.mattjarrett.dev
    tlsSecret: demo2-api-tls
    sqlRef:
      name: magic-rocket-sql
      backend: private-cloud
    nosqlRef:
      name: magic-rocket-nosql
    objectStorageRefs:
      - name: magic-rocket-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
