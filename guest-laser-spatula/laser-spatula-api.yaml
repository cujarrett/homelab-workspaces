apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: laser-spatula-api
spec:
  parameters:
    namespace: guest-laser-spatula
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo4-api.mattjarrett.dev
    tlsSecret: demo4-api-tls
    sqlRef:
      name: laser-spatula-sql
      backend: private-cloud
    nosqlRef:
      name: laser-spatula-nosql
    objectStorageRefs:
      - name: laser-spatula-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
