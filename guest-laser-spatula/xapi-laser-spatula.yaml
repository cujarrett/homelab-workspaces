apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-laser-spatula
spec:
  parameters:
    namespace: guest-laser-spatula
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo2-api.mattjarrett.dev
    tlsSecret: demo2-api-tls
    sqlRef:
      name: xsql-laser-spatula
      backend: private-cloud
    nosqlRef:
      name: xnosql-laser-spatula
    objectStorageRefs:
      - name: xobjectstorage-laser-spatula
    readinessCheckPath: /readyz
