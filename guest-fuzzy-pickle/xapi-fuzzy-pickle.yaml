apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-fuzzy-pickle
spec:
  parameters:
    namespace: guest-fuzzy-pickle
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo5-api.mattjarrett.dev
    tlsIssuer: letsencrypt-prod
    nosqlRef:
      name: xnosql-fuzzy-pickle
    objectStorageRef:
      name: xobjectstorage-fuzzy-pickle
    readinessCheckPath: /readyz
