apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: banana-tornado-api
spec:
  parameters:
    namespace: guest-banana-tornado
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo5-api.mattjarrett.dev
    tlsSecret: demo5-api-tls
    sqlRef:
      name: banana-tornado-sql
      backend: private-cloud
    nosqlRef:
      name: banana-tornado-nosql
    objectStorageRefs:
      - name: banana-tornado-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
