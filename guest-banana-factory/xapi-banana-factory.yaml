apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-banana-factory
spec:
  parameters:
    namespace: guest-banana-factory
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo5-api.mattjarrett.dev
    tlsIssuer: letsencrypt-prod
    nosqlRef:
      name: xnosql-banana-factory
    cache:
      enabled: true
