apiVersion: platform.local.lab/v1alpha1
kind: XSpa
metadata:
  name: frozen-cannon-spa
spec:
  parameters:
    namespace: guest-frozen-cannon
    image: ghcr.io/cujarrett/hello-world-spa:latest
    host: demo4.mattjarrett.dev
    tlsSecret: demo4-tls
    replicas: 1
    contentSecurityPolicy: default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' https://*.mattjarrett.dev; frame-ancestors 'none'; base-uri 'self';
