apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-jazzy-submarine
spec:
  parameters:
    namespace: guest-jazzy-submarine
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo3-api.mattjarrett.dev
    tlsIssuer: letsencrypt-prod
    objectStorageRef:
      name: xobjectstorage-jazzy-submarine
    cache:
      enabled: true
    readinessCheckPath: /readyz
