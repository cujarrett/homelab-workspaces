apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-phantom-waffle
spec:
  parameters:
    namespace: guest-phantom-waffle
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo3-api.mattjarrett.dev
    tlsIssuer: letsencrypt-prod
    sqlRef:
      name: xsql-phantom-waffle
      backend: private-cloud
    objectStorageRefs:
      - name: xobjectstorage-phantom-waffle
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
