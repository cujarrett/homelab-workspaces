apiVersion: platform.local.lab/v1alpha1
kind: Api
metadata:
  name: quantum-factory-api
spec:
  parameters:
    namespace: guest-quantum-factory
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo1-api.mattjarrett.dev
    tlsSecret: demo1-api-tls
    sqlRef:
      name: quantum-factory-sql
      backend: private-cloud
    nosqlRef:
      name: quantum-factory-nosql
    objectStorageRefs:
      - name: quantum-factory-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
