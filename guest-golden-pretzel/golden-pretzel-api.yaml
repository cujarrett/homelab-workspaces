apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: golden-pretzel-api
spec:
  parameters:
    namespace: guest-golden-pretzel
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo4-api.mattjarrett.dev
    tlsSecret: demo4-api-tls
    sqlRef:
      name: golden-pretzel-sql
      backend: private-cloud
    nosqlRef:
      name: golden-pretzel-nosql
    objectStorageRefs:
      - name: golden-pretzel-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
