apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-golden-tornado
spec:
  parameters:
    namespace: guest-golden-tornado
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo2-api.mattjarrett.dev
    tlsIssuer: letsencrypt-prod
    nosqlRef:
      name: xnosql-golden-tornado
    objectStorageRef:
      name: xobjectstorage-golden-tornado
    cache:
      enabled: true
    readinessCheckPath: /readyz
