apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: quantum-burrito-api
spec:
  parameters:
    namespace: guest-quantum-burrito
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo2-api.mattjarrett.dev
    tlsSecret: demo2-api-tls
    sqlRef:
      name: quantum-burrito-sql
      backend: private-cloud
    nosqlRef:
      name: quantum-burrito-nosql
    objectStorageRefs:
      - name: quantum-burrito-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
