apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: velvet-pretzel-api
spec:
  parameters:
    namespace: guest-velvet-pretzel
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo5-api.mattjarrett.dev
    tlsSecret: demo5-api-tls
    sqlRef:
      name: velvet-pretzel-sql
      backend: private-cloud
    nosqlRef:
      name: velvet-pretzel-nosql
    objectStorageRefs:
      - name: velvet-pretzel-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
