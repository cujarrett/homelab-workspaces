apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: blazing-cactus-api
spec:
  parameters:
    namespace: guest-blazing-cactus
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo1-api.mattjarrett.dev
    tlsSecret: demo1-api-tls
    sqlRef:
      name: blazing-cactus-sql
      backend: private-cloud
    nosqlRef:
      name: blazing-cactus-nosql
    objectStorageRefs:
      - name: blazing-cactus-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
