apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: midnight-toaster-api
spec:
  parameters:
    namespace: guest-midnight-toaster
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo2-api.mattjarrett.dev
    tlsSecret: demo2-api-tls
    sqlRef:
      name: midnight-toaster-sql
      backend: private-cloud
    nosqlRef:
      name: midnight-toaster-nosql
    objectStorageRefs:
      - name: midnight-toaster-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
