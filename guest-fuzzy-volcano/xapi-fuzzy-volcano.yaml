apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-fuzzy-volcano
spec:
  parameters:
    namespace: guest-fuzzy-volcano
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo5-api.mattjarrett.dev
    tlsIssuer: letsencrypt-prod
    sqlRef:
      name: xsql-fuzzy-volcano
    nosqlRef:
      name: xnosql-fuzzy-volcano
    objectStorageRef:
      name: xobjectstorage-fuzzy-volcano
    cache:
      enabled: true
    readinessCheckPath: /readyz
