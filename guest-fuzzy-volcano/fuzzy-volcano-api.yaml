apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: fuzzy-volcano-api
spec:
  parameters:
    namespace: guest-fuzzy-volcano
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo5-api.mattjarrett.dev
    tlsSecret: demo5-api-tls
    sqlRef:
      name: fuzzy-volcano-sql
      backend: private-cloud
    nosqlRef:
      name: fuzzy-volcano-nosql
    objectStorageRefs:
      - name: fuzzy-volcano-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
