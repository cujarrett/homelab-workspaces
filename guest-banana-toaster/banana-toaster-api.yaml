apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: banana-toaster-api
spec:
  parameters:
    namespace: guest-banana-toaster
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo1-api.mattjarrett.dev
    tlsSecret: demo1-api-tls
    sqlRef:
      name: banana-toaster-sql
      backend: private-cloud
    nosqlRef:
      name: banana-toaster-nosql
    objectStorageRefs:
      - name: banana-toaster-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
