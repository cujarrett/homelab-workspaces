apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: midnight-cannon-api
spec:
  parameters:
    namespace: guest-midnight-cannon
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo5-api.mattjarrett.dev
    tlsSecret: demo5-api-tls
    sqlRef:
      name: midnight-cannon-sql
      backend: private-cloud
    nosqlRef:
      name: midnight-cannon-nosql
    objectStorageRefs:
      - name: midnight-cannon-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
