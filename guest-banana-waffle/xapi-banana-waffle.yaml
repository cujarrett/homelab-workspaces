apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-banana-waffle
spec:
  parameters:
    namespace: guest-banana-waffle
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo4-api.mattjarrett.dev
    tlsIssuer: letsencrypt-prod
    sqlRef:
      name: xsql-banana-waffle
      backend: private-cloud
    nosqlRef:
      name: xnosql-banana-waffle
    objectStorageRefs:
      - name: xobjectstorage-banana-waffle
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
