apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-wandering-spreadsheet
spec:
  parameters:
    namespace: guest-wandering-spreadsheet
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo4-api.mattjarrett.dev
    tlsSecret: demo4-api-tls
    sqlRef:
      name: xsql-wandering-spreadsheet
      backend: private-cloud
    nosqlRef:
      name: xnosql-wandering-spreadsheet
    objectStorageRefs:
      - name: xobjectstorage-wandering-spreadsheet
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
