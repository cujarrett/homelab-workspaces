apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-magic-spreadsheet
spec:
  parameters:
    namespace: guest-magic-spreadsheet
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo5-api.mattjarrett.dev
    tlsIssuer: letsencrypt-prod
    sqlRef:
      name: xsql-magic-spreadsheet
    objectStorageRef:
      name: xobjectstorage-magic-spreadsheet
    cache:
      enabled: true
    readinessCheckPath: /readyz
