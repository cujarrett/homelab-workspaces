apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: phantom-volcano-api
spec:
  parameters:
    namespace: guest-phantom-volcano
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo4-api.mattjarrett.dev
    tlsSecret: demo4-api-tls
    sqlRef:
      name: phantom-volcano-sql
      backend: private-cloud
    nosqlRef:
      name: phantom-volcano-nosql
    objectStorageRefs:
      - name: phantom-volcano-store
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
