apiVersion: platform.local.lab/v1alpha1
kind: XApi
metadata:
  name: xapi-frozen-hamster
spec:
  parameters:
    namespace: guest-frozen-hamster
    image: ghcr.io/cujarrett/hello-world-api:latest
    port: 8080
    replicas: 1
    host: demo2-api.mattjarrett.dev
    tlsIssuer: letsencrypt-prod
    sqlRef:
      name: xsql-frozen-hamster
      backend: private-cloud
    nosqlRef:
      name: xnosql-frozen-hamster
    objectStorageRefs:
      - name: xobjectstorage-frozen-hamster
    cache:
      enabled: true
      backend: private-cloud
    readinessCheckPath: /readyz
